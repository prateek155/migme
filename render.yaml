services:
  # Backend Service
  - type: web
    name: migme-backend
    env: node
    region: singapore
    plan: starter
    buildCommand: cd backend && npm install
    startCommand: cd backend && node backend.js
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000

      # Encryption & Security
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: ADMIN_API_KEY
        generateValue: true

      # Firebase Config (match your project)
      - key: EXPO_PUBLIC_FIREBASE_API_KEY
        sync: false
      - key: EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: EXPO_PUBLIC_FIREBASE_PROJECT_ID
        sync: false
      - key: EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET
        sync: false
      - key: EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: EXPO_PUBLIC_FIREBASE_APP_ID
        sync: false

      # Firebase Admin SDK (for backend)
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false

      # AWS Bedrock (for AI email parsing)
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: ap-south-1
      - key: AWS_BEDROCK_MODEL
        value: qwen.qwen3-vl-235b-a22b

      # CORS Origins (your frontend URLs)
      # Update this after deploying frontend
      - key: CORS_ORIGINS
        value: https://migme-admin.onrender.com,https://migme-client.onrender.com

      # Optional: Log viewer token
      - key: LOG_TOKEN
        generateValue: true
